<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d1a">
    <title>GBA 模拟器 - 移动版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        :root {
            --bg-primary: #0d0d1a;
            --bg-secondary: #1a1a2e;
            --accent-success: #00d9ff;
            --accent-danger: #e94560;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* 主容器 */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .status-bar .title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-success);
        }

        .menu-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 游戏区域 */
        .game-area {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #game {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        /* 加载遮罩 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0,217,255,0.2);
            border-top-color: var(--accent-success);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .start-btn {
            padding: 12px 32px;
            background: linear-gradient(145deg, var(--accent-danger), #c0392b);
            border: none;
            border-radius: 24px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
            transition: transform 0.2s;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* 虚拟按键区域 */
        .controls-area {
            background: var(--bg-secondary);
            padding: 12px 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .controls-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 方向键 */
        .dpad {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .dpad-btn {
            position: absolute;
            background: linear-gradient(145deg, #2a2a40, #1a1a30);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.08s;
        }

        .dpad-btn:active, .dpad-btn.pressed {
            background: linear-gradient(145deg, #1a1a30, #2a2a40);
            transform: scale(0.95);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            color: var(--accent-success);
            border-color: var(--accent-success);
        }

        .dpad-up { top: 0; left: 46px; width: 48px; height: 44px; border-radius: 10px 10px 4px 4px; }
        .dpad-down { bottom: 0; left: 46px; width: 48px; height: 44px; border-radius: 4px 4px 10px 10px; }
        .dpad-left { top: 46px; left: 0; width: 44px; height: 48px; border-radius: 10px 4px 4px 10px; }
        .dpad-right { top: 46px; right: 0; width: 44px; height: 48px; border-radius: 4px 10px 10px 4px; }
        .dpad-center {
            position: absolute;
            top: 46px;
            left: 46px;
            width: 48px;
            height: 48px;
            background: rgba(20, 20, 40, 0.9);
            border-radius: 6px;
            pointer-events: none;
        }

        /* 动作按键区域 */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        /* L/R 肩键 */
        .shoulder-row {
            display: flex;
            gap: 12px;
        }

        .shoulder-btn {
            padding: 6px 20px;
            background: linear-gradient(145deg, #3a3a50, #2a2a40);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            min-height: 32px;
            cursor: pointer;
            transition: all 0.08s;
        }

        .shoulder-btn:active, .shoulder-btn.pressed {
            background: linear-gradient(145deg, #2a2a40, #3a3a50);
            transform: scale(0.95);
            color: var(--accent-success);
            border-color: var(--accent-success);
        }

        /* A/B 主按键 */
        .main-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.08s;
            user-select: none;
        }

        .action-btn:active, .action-btn.pressed {
            transform: scale(0.92);
        }

        .btn-a {
            background: linear-gradient(145deg, #e94560, #c0392b);
            border-color: rgba(233, 69, 96, 0.5);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn-a:active, .btn-a.pressed {
            background: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
        }

        .btn-b {
            background: linear-gradient(145deg, #00d9ff, #00a8cc);
            border-color: rgba(0, 217, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
        }

        .btn-b:active, .btn-b.pressed {
            background: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
        }

        /* Select / Start 系统键 */
        .system-row {
            display: flex;
            gap: 10px;
        }

        .system-btn {
            padding: 5px 14px;
            background: linear-gradient(145deg, #4a4a60, #3a3a50);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            transform: rotate(-10deg);
            cursor: pointer;
            transition: all 0.08s;
        }

        .system-btn:active, .system-btn.pressed {
            background: linear-gradient(145deg, #3a3a50, #4a4a60);
            color: var(--accent-success);
            border-color: var(--accent-success);
        }

        /* 菜单弹窗 */
        .menu-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .menu-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-content {
            width: 100%;
            max-width: 400px;
            background: var(--bg-secondary);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-modal.active .menu-content {
            transform: translateY(0);
        }

        .menu-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
            color: var(--accent-success);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .menu-item:active {
            background: rgba(255,255,255,0.08);
        }

        .menu-item-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .menu-item-text {
            flex: 1;
        }

        .menu-item-title {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .menu-item-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .menu-close {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
        }

        .menu-close:active {
            background: rgba(255,255,255,0.1);
        }

        input[type="file"] {
            display: none;
        }

        /* 响应式 - 小屏幕 */
        @media (max-width: 374px) {
            .dpad { width: 120px; height: 120px; }
            .dpad-btn { width: 38px; height: 38px; font-size: 1rem; }
            .dpad-up { top: 0; left: 41px; }
            .dpad-down { bottom: 0; left: 41px; }
            .dpad-left { top: 41px; left: 0; }
            .dpad-right { top: 41px; right: 0; }
            .dpad-center { top: 41px; left: 41px; width: 38px; height: 38px; }
            .action-btn { width: 50px; height: 50px; font-size: 1.1rem; }
        }

        /* 响应式 - 大屏幕 */
        @media (min-width: 431px) {
            .dpad { width: 160px; height: 160px; }
            .dpad-btn { width: 52px; height: 52px; font-size: 1.3rem; }
            .dpad-up { top: 0; left: 54px; }
            .dpad-down { bottom: 0; left: 54px; }
            .dpad-left { top: 54px; left: 0; }
            .dpad-right { top: 54px; right: 0; }
            .dpad-center { top: 54px; left: 54px; width: 52px; height: 52px; }
            .action-btn { width: 64px; height: 64px; font-size: 1.3rem; }
        }

        /* iOS 底部安全区域 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .controls-area {
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <span class="title">GBA 模拟器</span>
            <button class="menu-btn" id="menuBtn">&#9776;</button>
        </div>

        <!-- 游戏画面区域 -->
        <div class="game-area">
            <div id="game"></div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text" id="loadingText">点击开始加载模拟器</div>
                <button class="start-btn" id="startBtn">开始游戏</button>
            </div>
        </div>

        <!-- 虚拟按键区域 -->
        <div class="controls-area" id="controlsArea">
            <div class="controls-main">
                <!-- 方向键 -->
                <div class="dpad" id="dpad">
                    <div class="dpad-btn dpad-up" data-key="UP">&#9650;</div>
                    <div class="dpad-btn dpad-down" data-key="DOWN">&#9660;</div>
                    <div class="dpad-btn dpad-left" data-key="LEFT">&#9664;</div>
                    <div class="dpad-btn dpad-right" data-key="RIGHT">&#9654;</div>
                    <div class="dpad-center"></div>
                </div>

                <!-- 动作按键 -->
                <div class="action-area">
                    <div class="shoulder-row">
                        <button class="shoulder-btn" data-key="L">L</button>
                        <button class="shoulder-btn" data-key="R">R</button>
                    </div>
                    <div class="main-actions">
                        <button class="action-btn btn-b" data-key="B">B</button>
                        <button class="action-btn btn-a" data-key="A">A</button>
                    </div>
                    <div class="system-row">
                        <button class="system-btn" data-key="SELECT">SELECT</button>
                        <button class="system-btn" data-key="START">START</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 菜单弹窗 -->
    <div class="menu-modal" id="menuModal">
        <div class="menu-content">
            <div class="menu-title">游戏菜单</div>
            <div class="menu-item" id="menuLoadRom">
                <div class="menu-item-icon">&#128194;</div>
                <div class="menu-item-text">
                    <div class="menu-item-title">加载 ROM</div>
                    <div class="menu-item-desc">选择 .gba 游戏文件</div>
                </div>
            </div>
            <div class="menu-item" id="menuSaveState">
                <div class="menu-item-icon">&#128190;</div>
                <div class="menu-item-text">
                    <div class="menu-item-title">保存存档</div>
                    <div class="menu-item-desc">保存当前游戏进度</div>
                </div>
            </div>
            <div class="menu-item" id="menuLoadState">
                <div class="menu-item-icon">&#128193;</div>
                <div class="menu-item-text">
                    <div class="menu-item-title">读取存档</div>
                    <div class="menu-item-desc">恢复之前保存的进度</div>
                </div>
            </div>
            <div class="menu-item" id="menuFullscreen">
                <div class="menu-item-icon">&#9974;</div>
                <div class="menu-item-text">
                    <div class="menu-item-title">全屏模式</div>
                    <div class="menu-item-desc">切换全屏显示</div>
                </div>
            </div>
            <button class="menu-close" id="menuClose">关闭菜单</button>
        </div>
    </div>

    <input type="file" id="romInput" accept=".gba,.bin,.zip">

    <!-- EmulatorJS 配置 -->
    <script>
        window.EJS_player = "#game";
        window.EJS_core = "gba";
        window.EJS_gameUrl = "";
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = true;
        window.EJS_language = "zh-CN";
    </script>

    <!-- 加载 EmulatorJS -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script>
        // 全局状态
        const AppState = {
            isRunning: false,
            touchMap: new Map()
        };

        const $ = id => document.getElementById(id);

        // 防止页面滚动和缩放
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });

        // 虚拟按键处理
        function setupVirtualButtons() {
            const buttons = document.querySelectorAll('[data-key]');
            const keyMap = { 'UP': 4, 'DOWN': 5, 'LEFT': 6, 'RIGHT': 7, 'A': 0, 'B': 1, 'SELECT': 2, 'START': 3, 'L': 9, 'R': 8 };

            buttons.forEach(btn => {
                const keyId = keyMap[btn.dataset.key];
                if (keyId === undefined) return;

                const press = (e) => {
                    e.preventDefault();
                    btn.classList.add('pressed');
                    sendKey(keyId, 1);
                };

                const release = (e) => {
                    e.preventDefault();
                    btn.classList.remove('pressed');
                    sendKey(keyId, 0);
                };

                btn.addEventListener('touchstart', press, { passive: false });
                btn.addEventListener('touchend', release, { passive: false });
                btn.addEventListener('touchcancel', release, { passive: false });
                btn.addEventListener('mousedown', press);
                btn.addEventListener('mouseup', release);
                btn.addEventListener('mouseleave', release);
            });
        }

        // 发送按键到模拟器
        function sendKey(keyId, state) {
            // 通过 postMessage 发送到 iframe
            const iframe = document.querySelector('#game iframe');
            if (iframe?.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'key', key: keyId, state }, '*');
            }
            // 同时尝试通过 gamepad API
            if (window.EJS_emulator?.gamepad) {
                window.EJS_emulator.gamepad(keyId, state);
            }
        }

        // 加载 ROM
        async function loadROM(romData, fileName) {
            try {
                $('loadingText').textContent = '正在启动游戏...';
                $('startBtn').style.display = 'none';

                const blob = new Blob([romData], { type: 'application/octet-stream' });
                const romUrl = URL.createObjectURL(blob);

                // 更新 EmulatorJS 配置
                window.EJS_gameUrl = romUrl;
                window.EJS_gameName = fileName.replace(/\.[^/.]+$/, "");
                window.EJS_startOnLoaded = true;

                // 重新加载页面以应用新配置
                location.reload();
            } catch (err) {
                console.error('加载失败:', err);
                $('loadingText').textContent = '加载失败: ' + err.message;
                $('startBtn').style.display = 'block';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            setupVirtualButtons();

            // 开始按钮
            $('startBtn').addEventListener('click', () => {
                $('loadingText').textContent = '正在加载模拟器核心...';
                $('startBtn').style.display = 'none';
                
                // 尝试加载预置 ROM
                fetch('roms/PokemonEmerald.gba')
                    .then(r => r.ok ? r.arrayBuffer() : Promise.reject('No ROM'))
                    .then(buffer => loadROM(new Uint8Array(buffer), 'PokemonEmerald.gba'))
                    .catch(() => {
                        $('loadingText').textContent = '没有预置游戏，请从菜单加载 ROM';
                        $('loadingOverlay').classList.add('hidden');
                    });
            });

            // ROM 文件选择
            $('romInput').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => loadROM(new Uint8Array(ev.target.result), file.name);
                reader.readAsArrayBuffer(file);
            });

            // 菜单
            $('menuBtn').addEventListener('click', () => $('menuModal').classList.add('active'));
            $('menuClose').addEventListener('click', () => $('menuModal').classList.remove('active'));
            $('menuModal').addEventListener('click', e => { if (e.target === $('menuModal')) $('menuModal').classList.remove('active'); });
            $('menuLoadRom').addEventListener('click', () => { $('menuModal').classList.remove('active'); $('romInput').click(); });
            $('menuFullscreen').addEventListener('click', () => {
                $('menuModal').classList.remove('active');
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen?.() || document.body.requestFullscreen?.();
                } else {
                    document.exitFullscreen?.();
                }
            });

            // 如果已经有 ROM URL，隐藏加载层
            if (window.EJS_gameUrl) {
                $('loadingOverlay').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
