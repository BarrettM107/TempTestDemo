<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d1a">
    <title>GBA 模拟器 - 移动版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        :root {
            --bg-primary: #0d0d1a;
            --bg-secondary: #1a1a2e;
            --accent-success: #00d9ff;
            --accent-danger: #e94560;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .status-bar .title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-success);
        }

        .menu-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-area {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
            /* 关键修复：确保有明确的最小高度 */
            min-height: 200px;
        }

        #game {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 关键修复：强制 EmulatorJS Canvas 正确尺寸 */
        #game canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .controls-area {
            background: var(--bg-secondary);
            padding: 12px 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .controls-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .dpad {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .dpad-btn {
            position: absolute;
            background: linear-gradient(145deg, #2a2a40, #1a1a30);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.08s;
        }

        .dpad-btn:active, .dpad-btn.pressed {
            background: linear-gradient(145deg, #1a1a30, #2a2a40);
            transform: scale(0.95);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            color: var(--accent-success);
            border-color: var(--accent-success);
        }

        .dpad-up { top: 0; left: 46px; width: 48px; height: 44px; border-radius: 10px 10px 4px 4px; }
        .dpad-down { bottom: 0; left: 46px; width: 48px; height: 44px; border-radius: 4px 4px 10px 10px; }
        .dpad-left { top: 46px; left: 0; width: 44px; height: 48px; border-radius: 10px 4px 4px 10px; }
        .dpad-right { top: 46px; right: 0; width: 44px; height: 48px; border-radius: 4px 10px 10px 4px; }
        .dpad-center {
            position: absolute;
            top: 46px;
            left: 46px;
            width: 48px;
            height: 48px;
            background: rgba(20, 20, 40, 0.9);
            border-radius: 6px;
            pointer-events: none;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .shoulder-row { display: flex; gap: 12px; }

        .shoulder-btn {
            padding: 6px 20px;
            background: linear-gradient(145deg, #3a3a50, #2a2a40);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            min-height: 32px;
            cursor: pointer;
            transition: all 0.08s;
        }

        .shoulder-btn:active, .shoulder-btn.pressed {
            background: linear-gradient(145deg, #2a2a40, #3a3a50);
            transform: scale(0.95);
            color: var(--accent-success);
            border-color: var(--accent-success);
        }

        .main-actions { display: flex; gap: 16px; align-items: center; }

        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.08s;
            user-select: none;
        }

        .action-btn:active, .action-btn.pressed { transform: scale(0.92); }

        .btn-a {
            background: linear-gradient(145deg, #e94560, #c0392b);
            border-color: rgba(233, 69, 96, 0.5);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn-a:active, .btn-a.pressed {
            background: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
        }

        .btn-b {
            background: linear-gradient(145deg, #00d9ff, #00a8cc);
            border-color: rgba(0, 217, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
        }

        .btn-b:active, .btn-b.pressed {
            background: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
        }

        .system-row { display: flex; gap: 10px; }

        .system-btn {
            padding: 5px 14px;
            background: linear-gradient(145deg, #4a4a60, #3a3a50);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            transform: rotate(-10deg);
            cursor: pointer;
            transition: all 0.08s;
        }

        .system-btn:active, .system-btn.pressed {
            background: linear-gradient(145deg, #3a3a50, #4a4a60);
            color: var(--accent-success);
            border-color: var(--accent-success);
        }

        .menu-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .menu-modal.active { opacity: 1; pointer-events: auto; }

        .menu-content {
            width: 100%;
            max-width: 400px;
            background: var(--bg-secondary);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-modal.active .menu-content { transform: translateY(0); }

        .menu-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
            color: var(--accent-success);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .menu-item:active { background: rgba(255,255,255,0.08); }

        .menu-item-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .menu-item-title { font-size: 0.95rem; font-weight: 500; }
        .menu-item-desc { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

        .menu-close {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
        }

        .menu-close:active { background: rgba(255,255,255,0.1); }

        input[type="file"] { display: none; }

        /* 初始加载界面 */
        #start-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 50;
        }

        #start-screen p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        #start-screen .btn {
            padding: 12px 32px;
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: var(--accent-success);
            font-size: 1rem;
            gap: 16px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0,217,255,0.2);
            border-top-color: var(--accent-success);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 调试信息面板 */
        #debug-panel {
            position: fixed;
            top: 0; right: 0;
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            z-index: 9999;
            display: none;
            border-bottom: 2px solid #0f0;
            word-break: break-all;
        }

        #debug-panel .debug-title {
            color: #ff0;
            font-weight: bold;
            margin-bottom: 4px;
        }

        #debug-panel .debug-error { color: #f00; }
        #debug-panel .debug-warn { color: #ff0; }
        #debug-panel .debug-info { color: #0ff; }

        @media (max-width: 374px) {
            .dpad { width: 120px; height: 120px; }
            .dpad-up, .dpad-down { left: 41px; width: 38px; height: 38px; }
            .dpad-left, .dpad-right { top: 41px; width: 38px; height: 38px; }
            .dpad-center { top: 41px; left: 41px; width: 38px; height: 38px; }
            .action-btn { width: 50px; height: 50px; }
        }

        @media (min-width: 431px) {
            .dpad { width: 160px; height: 160px; }
            .dpad-up, .dpad-down { left: 54px; width: 52px; height: 52px; }
            .dpad-left, .dpad-right { top: 54px; width: 52px; height: 52px; }
            .dpad-center { top: 54px; left: 54px; width: 52px; height: 52px; }
            .action-btn { width: 64px; height: 64px; }
        }

        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .controls-area { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <!-- 调试面板 -->
    <div id="debug-panel">
        <div class="debug-title">[Debug Log]</div>
        <div id="debug-content"></div>
    </div>

    <div class="app-container">
        <div class="status-bar">
            <span class="title">GBA 模拟器</span>
            <div style="display:flex;gap:8px;">
                <button class="menu-btn" id="debugBtn" style="font-size:0.7rem;width:auto;padding:0 8px;">BUG</button>
                <button class="menu-btn" id="menuBtn">&#9776;</button>
            </div>
        </div>

        <div class="game-area">
            <div id="game">
                <div id="start-screen">
                    <p>选择 .gba ROM 文件开始游戏</p>
                    <input type="file" id="romInput" accept=".gba,.bin,.zip">
                    <button class="btn" onclick="document.getElementById('romInput').click()">选择 ROM 文件</button>
                </div>
            </div>
        </div>

        <div class="controls-area" id="controlsArea">
            <div class="controls-main">
                <div class="dpad">
                    <div class="dpad-btn dpad-up" data-key="UP">&#9650;</div>
                    <div class="dpad-btn dpad-down" data-key="DOWN">&#9660;</div>
                    <div class="dpad-btn dpad-left" data-key="LEFT">&#9664;</div>
                    <div class="dpad-btn dpad-right" data-key="RIGHT">&#9654;</div>
                    <div class="dpad-center"></div>
                </div>

                <div class="action-area">
                    <div class="shoulder-row">
                        <button class="shoulder-btn" data-key="L">L</button>
                        <button class="shoulder-btn" data-key="R">R</button>
                    </div>
                    <div class="main-actions">
                        <button class="action-btn btn-b" data-key="B">B</button>
                        <button class="action-btn btn-a" data-key="A">A</button>
                    </div>
                    <div class="system-row">
                        <button class="system-btn" data-key="SELECT">SELECT</button>
                        <button class="system-btn" data-key="START">START</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="menu-modal" id="menuModal">
        <div class="menu-content">
            <div class="menu-title">游戏菜单</div>
            <div class="menu-item" id="menuLoadRom">
                <div class="menu-item-icon">&#128194;</div>
                <div>
                    <div class="menu-item-title">加载 ROM</div>
                    <div class="menu-item-desc">选择 .gba 游戏文件</div>
                </div>
            </div>
            <div class="menu-item" id="menuFullscreen">
                <div class="menu-item-icon">&#9974;</div>
                <div>
                    <div class="menu-item-title">全屏模式</div>
                    <div class="menu-item-desc">切换全屏显示</div>
                </div>
            </div>
            <button class="menu-close" id="menuClose">关闭菜单</button>
        </div>
    </div>

    <input type="file" id="romInput2" accept=".gba,.bin,.zip">

    <script>
        // ===== 调试日志系统 =====
        const debugPanel = document.getElementById('debug-panel');
        const debugContent = document.getElementById('debug-content');
        let debugVisible = false;

        function debugLog(msg, type) {
            type = type || 'info';
            const line = document.createElement('div');
            line.className = 'debug-' + type;
            const time = new Date().toLocaleTimeString();
            line.textContent = '[' + time + '] ' + msg;
            debugContent.appendChild(line);
            debugContent.scrollTop = debugContent.scrollHeight;
            // 同时输出到控制台
            if (type === 'error') console.error(msg);
            else if (type === 'warn') console.warn(msg);
            else console.log(msg);
        }

        document.getElementById('debugBtn').addEventListener('click', function() {
            debugVisible = !debugVisible;
            debugPanel.style.display = debugVisible ? 'block' : 'none';
        });

        // ===== 环境检测 =====
        debugLog('UserAgent: ' + navigator.userAgent.substring(0, 100));
        debugLog('Screen: ' + screen.width + 'x' + screen.height);
        debugLog('DevicePixelRatio: ' + window.devicePixelRatio);

        // 检测 WebGL 支持
        (function() {
            try {
                const c = document.createElement('canvas');
                const gl = c.getContext('webgl2') || c.getContext('webgl');
                if (gl) {
                    debugLog('WebGL: OK (' + (gl instanceof WebGL2RenderingContext ? '2.0' : '1.0') + ')', 'info');
                } else {
                    debugLog('WebGL: NOT SUPPORTED!', 'error');
                }
            } catch(e) {
                debugLog('WebGL test error: ' + e.message, 'error');
            }
        })();

        // 检测 SharedArrayBuffer
        debugLog('SharedArrayBuffer: ' + (typeof SharedArrayBuffer !== 'undefined' ? 'OK' : 'NOT AVAILABLE'), typeof SharedArrayBuffer !== 'undefined' ? 'info' : 'warn');

        // 检测 WebAssembly
        debugLog('WebAssembly: ' + (typeof WebAssembly !== 'undefined' ? 'OK' : 'NOT SUPPORTED'), typeof WebAssembly !== 'undefined' ? 'info' : 'error');

        // ===== 防止页面滚动和缩放 =====
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            var now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });

        var $ = function(id) { return document.getElementById(id); };
        var gameDiv = $('game');
        var startScreen = $('start-screen');

        // ===== 菜单 =====
        $('menuBtn').addEventListener('click', function() { $('menuModal').classList.add('active'); });
        $('menuClose').addEventListener('click', function() { $('menuModal').classList.remove('active'); });
        $('menuModal').addEventListener('click', function(e) { if (e.target === $('menuModal')) $('menuModal').classList.remove('active'); });
        $('menuLoadRom').addEventListener('click', function() { $('menuModal').classList.remove('active'); $('romInput2').click(); });
        $('menuFullscreen').addEventListener('click', function() {
            $('menuModal').classList.remove('active');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen && document.exitFullscreen();
            }
        });

        // ===== 本地 EmulatorJS 数据路径 =====
        var LOCAL_DATA_PATH = 'data/';

        // ===== ROM 文件选择 =====
        function handleRomSelect(file) {
            if (!file) return;
            debugLog('ROM selected: ' + file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB)');

            // 显示加载提示
            startScreen.innerHTML = '<div class="loading-overlay"><div class="loading-spinner"></div><div>正在加载模拟器核心...</div><div style="font-size:0.75rem;color:#888;">首次加载约需 10-20 秒</div></div>';
            startScreen.style.display = 'flex';

            var reader = new FileReader();
            reader.onload = function(event) {
                var romData = new Uint8Array(event.target.result);
                debugLog('ROM read into memory: ' + romData.length + ' bytes');

                var romBlob = new Blob([romData], { type: 'application/octet-stream' });
                var romUrl = URL.createObjectURL(romBlob);
                debugLog('Blob URL created: ' + romUrl.substring(0, 50) + '...');

                // 关键配置：不自动启动，让用户手动点击 Start
                window.EJS_player = '#game';
                window.EJS_core = 'gba';
                window.EJS_gameUrl = romUrl;
                window.EJS_startOnLoaded = false; // 关键！移动端需要用户手势启动
                window.EJS_language = 'en-US';
                window.EJS_gameName = file.name.replace(/\.[^/.]+$/, '');
                window.EJS_threads = false; // 关键！避免 SharedArrayBuffer 问题
                window.EJS_pathtodata = LOCAL_DATA_PATH;

                debugLog('EJS config set. Using LOCAL data path');

                // 加载本地 loader.js
                var script = document.createElement('script');
                script.src = LOCAL_DATA_PATH + 'loader.js';
                script.onload = function() {
                    debugLog('Local loader.js loaded OK!', 'info');
                    script.loaded = true;
                    startScreen.style.display = 'none';

                    // 监听游戏启动后的状态
                    setTimeout(function() {
                        checkGameStatus();
                    }, 3000);
                    setTimeout(function() {
                        checkGameStatus();
                    }, 10000);
                    setTimeout(function() {
                        checkGameStatus();
                    }, 20000);
                };
                script.onerror = function() {
                    debugLog('Local loader.js failed!', 'error');
                    startScreen.innerHTML = '<div class="loading-overlay"><div style="color:#e94560;">本地核心加载失败</div><div style="font-size:0.75rem;color:#888;">请刷新页面重试</div></div>';
                };
                document.head.appendChild(script);
            };
            reader.onerror = function() {
                debugLog('FileReader error!', 'error');
                startScreen.innerHTML = '<div class="loading-overlay"><div style="color:#e94560;">读取文件失败</div></div>';
            };
            reader.readAsArrayBuffer(file);
        }

        // 检查游戏状态
        function checkGameStatus() {
            var canvas = gameDiv.querySelector('canvas');
            if (canvas) {
                debugLog('Canvas found: ' + canvas.width + 'x' + canvas.height + ' (CSS: ' + canvas.clientWidth + 'x' + canvas.clientHeight + ')');
                if (canvas.width > 0 && canvas.height > 0) {
                    debugLog('Game appears to be running!', 'info');
                } else {
                    debugLog('Canvas has zero dimensions - game may not have started', 'warn');
                }
            } else {
                debugLog('No canvas found in #game yet', 'warn');
            }

            // 检查 EmulatorJS 状态
            if (window.EJS_emulator) {
                debugLog('EJS_emulator exists');
            } else {
                debugLog('EJS_emulator not found yet', 'warn');
            }
        }

        // 初始界面的文件选择
        $('romInput').addEventListener('change', function(e) {
            handleRomSelect(e.target.files[0]);
        });

        // 菜单中的文件选择
        $('romInput2').addEventListener('change', function(e) {
            handleRomSelect(e.target.files[0]);
        });

        // 拦截全局错误
        window.addEventListener('error', function(e) {
            debugLog('Global error: ' + (e.message || e) + ' at ' + (e.filename || ''), 'error');
        });
        window.addEventListener('unhandledrejection', function(e) {
            debugLog('Unhandled promise: ' + (e.reason || ''), 'error');
        });
    </script>
</body>
</html>
