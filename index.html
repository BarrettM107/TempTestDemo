<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GBA 模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        h1 { color: #f1c40f; margin: 10px 0 5px; font-size: 1.4rem; }
        p.sub { color: #888; font-size: 0.8rem; margin-bottom: 10px; }
        #game {
            width: 640px;
            height: 480px;
            max-width: 95vw;
            max-height: 60vh;
            background: #000;
            border-radius: 8px;
            position: relative;
        }
        .info {
            margin: 10px;
            color: #666;
            font-size: 0.75rem;
            text-align: center;
            line-height: 1.8;
        }
        .info kbd {
            display: inline-block;
            padding: 2px 6px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            font-family: monospace;
            color: #ccc;
            margin: 0 2px;
        }
        .btn {
            padding: 10px 24px;
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        input[type="file"] { display: none; }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #f1c40f;
            font-size: 1rem;
            gap: 16px;
            border-radius: 8px;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(241,196,15,0.2);
            border-top-color: #f1c40f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #start-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 8px;
            z-index: 50;
        }
        #start-screen .btn { margin-top: 20px; }
        #start-screen p { color: #888; font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>GBA 模拟器</h1>
    <p class="sub">基于 mGBA WebAssembly 核心 | 支持 .gba 文件</p>

    <div id="game">
        <div id="start-screen">
            <p>选择 .gba ROM 文件后，模拟器会自动启动</p>
            <input type="file" id="romInput" accept=".gba,.bin,.zip">
            <button class="btn" onclick="document.getElementById('romInput').click()">选择 ROM 文件</button>
        </div>
    </div>

    <div class="info">
        <p>键盘：<kbd>方向键</kbd> 移动 <kbd>Z</kbd> A <kbd>X</kbd> B <kbd>Enter</kbd> Start <kbd>Shift</kbd> Select</p>
    </div>

    <script>
        const romInput = document.getElementById('romInput');
        const gameDiv = document.getElementById('game');
        const startScreen = document.getElementById('start-screen');

        // CDN 备用列表 - 包含多个国内/国际 CDN 源
        const CDN_LIST = [
            { data: 'https://cdn.emulatorjs.org/latest/data/', loader: 'https://cdn.emulatorjs.org/latest/data/loader.js' },
            { data: 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/', loader: 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js' },
            { data: 'https://fastly.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/', loader: 'https://fastly.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js' },
            { data: 'https://gcore.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/', loader: 'https://gcore.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js' },
            { data: 'https://testingcf.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/', loader: 'https://testingcf.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js' }
        ];

        romInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 显示加载提示
            startScreen.innerHTML = '<div class="loading-overlay"><div class="loading-spinner"></div><div>正在加载模拟器核心...</div><div style="font-size:0.75rem;color:#888;">首次加载约需 10-20 秒</div></div>';

            const reader = new FileReader();
            reader.onload = function(event) {
                const romData = new Uint8Array(event.target.result);
                const romBlob = new Blob([romData], { type: 'application/octet-stream' });
                const romUrl = URL.createObjectURL(romBlob);

                // 设置 EmulatorJS 配置
                window.EJS_player = '#game';
                window.EJS_core = 'gba';
                window.EJS_gameUrl = romUrl;
                window.EJS_startOnLoaded = true;
                window.EJS_language = 'en-US';
                window.EJS_gameName = file.name.replace(/\.[^/.]+$/, '');

                // 尝试加载 CDN，自动切换备用源
                let cdnIndex = 0;
                function tryLoadCDN() {
                    if (cdnIndex >= CDN_LIST.length) {
                        startScreen.innerHTML = '<div class="loading-overlay"><div style="color:#e94560;">所有 CDN 加载失败</div><div style="font-size:0.75rem;color:#888;">请检查网络连接后刷新重试</div></div>';
                        return;
                    }
                    const cdn = CDN_LIST[cdnIndex];
                    window.EJS_pathtodata = cdn.data;

                    const script = document.createElement('script');
                    script.src = cdn.loader;
                    script.onload = function() {
                        startScreen.style.display = 'none';
                    };
                    script.onerror = function() {
                        cdnIndex++;
                        tryLoadCDN();
                    };
                    // 添加超时处理
                    setTimeout(function() {
                        if (!script.loaded) {
                            script.onerror();
                        }
                    }, 10000);
                    document.head.appendChild(script);
                }
                tryLoadCDN();
            };
            reader.onerror = function() {
                startScreen.innerHTML = '<div class="loading-overlay"><div style="color:#e94560;">读取文件失败</div></div>';
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
