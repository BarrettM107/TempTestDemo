<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GBA 模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #f1c40f;
            margin: 15px 0 5px;
            font-size: 1.4rem;
        }
        p.sub { color: #888; font-size: 0.8rem; margin-bottom: 15px; }
        #game {
            width: 640px;
            height: 480px;
            max-width: 95vw;
            max-height: 70vh;
            background: #000;
            border-radius: 8px;
        }
        .info {
            margin: 15px;
            color: #666;
            font-size: 0.75rem;
            text-align: center;
            line-height: 1.8;
        }
        .info kbd {
            display: inline-block;
            padding: 2px 6px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            font-family: monospace;
            color: #ccc;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <h1>GBA 模拟器</h1>
    <p class="sub">基于 mGBA WebAssembly 核心</p>

    <div id="game"></div>

    <div class="info">
        <p>点击上方 <strong>开始游戏</strong> 按钮，选择 .gba ROM 文件即可游玩</p>
        <p>键盘：<kbd>方向键</kbd> 移动 <kbd>Z</kbd> A <kbd>X</kbd> B <kbd>Enter</kbd> Start <kbd>Shift</kbd> Select</p>
    </div>

    <script>
        window.EJS_player = "#game";
        window.EJS_core = "gba";
        window.EJS_gameUrl = "";
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = false;
        window.EJS_language = "zh-CN";
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
