<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Emulator Test</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            color: #f1c40f;
            margin-bottom: 20px;
        }
        #game {
            width: 640px;
            height: 480px;
            max-width: 100%;
            background: #000;
            border-radius: 8px;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            color: #fff;
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
        }
        button:hover {
            transform: translateY(-2px);
        }
        .info {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>GBA 模拟器 - 口袋妖怪绿宝石测试</h1>

    <div id="game"></div>

    <div class="controls">
        <input type="file" id="romInput" accept=".gba" hidden>
        <button onclick="document.getElementById('romInput').click()">加载 ROM</button>
        <button onclick="location.reload()">刷新页面</button>
    </div>

    <div class="info">
        <p>键盘映射：方向键=移动 | Z=A键 | X=B键 | Enter=Start | Shift=Select</p>
        <p>如果游戏没有自动启动，请刷新页面后再加载 ROM</p>
    </div>

    <script>
        // EmulatorJS 配置
        window.EJS_player = "#game";
        window.EJS_core = "gba";
        window.EJS_gameUrl = "";
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = true;
        window.EJS_language = "zh-CN";

        // ROM 文件处理
        document.getElementById('romInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const romData = new Uint8Array(event.target.result);
                const blob = new Blob([romData], { type: 'application/octet-stream' });
                const romUrl = URL.createObjectURL(blob);

                // 更新配置
                window.EJS_gameUrl = romUrl;
                window.EJS_gameName = file.name.replace(/\.[^/.]+$/, "");

                console.log('ROM loaded:', file.name, 'Size:', romData.length);

                // 重新加载页面以启动游戏
                // EmulatorJS 需要在页面加载时就有 EJS_gameUrl
                location.reload();
            };
            reader.readAsArrayBuffer(file);
        });

        // 尝试自动加载 roms 目录下的 ROM
        fetch('roms/PokemonEmerald.gba')
            .then(response => {
                if (response.ok) {
                    return response.arrayBuffer();
                }
                throw new Error('No preset ROM');
            })
            .then(buffer => {
                const romData = new Uint8Array(buffer);
                const blob = new Blob([romData], { type: 'application/octet-stream' });
                window.EJS_gameUrl = URL.createObjectURL(blob);
                window.EJS_gameName = 'PokemonEmerald';
                console.log('Auto-loaded ROM, size:', romData.length);
            })
            .catch(err => {
                console.log('No auto-load ROM:', err.message);
            });
    </script>

    <!-- 加载 EmulatorJS -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
